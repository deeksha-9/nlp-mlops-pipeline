services:
  - type: web
    name: nlp-sentiment-api
    env: python
    region: oregon
    plan: free

    buildCommand: pip install -r requirements.txt && python src/train.py

    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: MLFLOW_TRACKING_URI
        value: ./mlruns